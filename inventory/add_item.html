{% extends "base.html" %}

{% block title %}
Add Inventory Item
{% endblock %}

{% block extra_css %}
<link rel="stylesheet"
href="{{ url_for('static', filename='css/inventory.css') }}">
{% endblock %}

{% block content %}

<div class="inventory-form-container">

    <div class="inventory-form-card">

        <h2>

            <i class="fas fa-box-open"></i>

            Add Inventory Item

        </h2>

        <form method="POST">

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label>Item Code</label>

                    <input
                        type="text"
                        name="item_code"
                        class="form-control"
                        required>

                </div>

                <div class="col-md-6 mb-3">

                    <label>Item Name</label>

                    <input
                        type="text"
                        name="item_name"
                        class="form-control"
                        required>

                </div>

                <div class="col-md-6 mb-3">

                    <label>Category</label>

                    <input
                        type="text"
                        name="category"
                        class="form-control"
                        required>

                </div>

                <div class="col-md-6 mb-3">

                    <label>Quantity</label>

                    <input
                        type="number"
                        name="quantity"
                        class="form-control"
                        required>

                </div>

                <div class="col-md-6 mb-3">

                    <label>Minimum Stock</label>

                    <input
                        type="number"
                        name="minimum_stock"
                        class="form-control"
                        value="10">

                </div>

                <div class="col-md-6 mb-3">

                    <label>Supplier Name</label>

                    <input
                        type="text"
                        name="supplier"
                        class="form-control">

                </div>

            </div>

            <button
                class="btn btn-success submit-btn">

                Save Inventory Item

            </button>

        </form>

    </div>

</div>

{% endblock %}
