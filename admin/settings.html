{% extends 'admin/layout.html' %}
{% block title %}System Settings{% endblock %}
{% block admin_content %}
<div class="container mt-4">
    <h2 class="mb-4">System Settings</h2>
    
    <div class="row g-4">
        <div class="col-md-6">
            <div class="glass-card">
                <h5 class="mb-3">Hospital Information</h5>
                <form>
                    <div class="mb-3">
                        <label class="form-label">Hospital Name</label>
                        <input type="text" class="form-control" value="Sahara Hospital">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Address</label>
                        <textarea class="form-control" rows="3">123 Medical Center, Healthcare City</textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Phone</label>
                        <input type="text" class="form-control" value="+91 123 456 7890">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" value="info@saharahospital.com">
                    </div>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </form>
            </div>
        </div>
        
        <div class="col-md-6">
            <div class="glass-card">
                <h5 class="mb-3">Email Configuration</h5>
                <form>
                    <div class="mb-3">
                        <label class="form-label">SMTP Server</label>
                        <input type="text" class="form-control" placeholder="smtp.gmail.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">SMTP Port</label>
                        <input type="number" class="form-control" value="587">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email Username</label>
                        <input type="email" class="form-control" placeholder="noreply@saharahospital.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email Password</label>
                        <input type="password" class="form-control" placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-primary">Test Email</button>
                </form>
            </div>
        </div>
        
        <div class="col-md-6">
            <div class="glass-card">
                <h5 class="mb-3">Branding</h5>
                <form>
                    <div class="mb-3">
                        <label class="form-label">Logo URL</label>
                        <input type="text" class="form-control" placeholder="/static/images/logo.png">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Primary Color</label>
                        <input type="color" class="form-control form-control-color" value="#4f46e5">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Secondary Color</label>
                        <input type="color" class="form-control form-control-color" value="#06b6d4">
                    </div>
                    <button type="submit" class="btn btn-primary">Update Branding</button>
                </form>
            </div>
        </div>
        
        <div class="col-md-6">
            <div class="glass-card">
                <h5 class="mb-3">System Configuration</h5>
                <form>
                    <div class="mb-3">
                        <label class="form-label">Default Currency</label>
                        <select class="form-select">
                            <option value="INR" selected>INR (₹)</option>
                            <option value="USD">USD ($)</option>
                            <option value="EUR">EUR (€)</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Timezone</label>
                        <select class="form-select">
                            <option value="Asia/Kolkata" selected>Asia/Kolkata (IST)</option>
                            <option value="UTC">UTC</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Date Format</label>
                        <select class="form-select">
                            <option value="DD-MM-YYYY" selected>DD-MM-YYYY</option>
                            <option value="MM-DD-YYYY">MM-DD-YYYY</option>
                            <option value="YYYY-MM-DD">YYYY-MM-DD</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Save Configuration</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
