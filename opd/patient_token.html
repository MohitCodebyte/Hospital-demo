{% extends "base.html" %}

{% block title %}Get OPD Token - Sahara Hospital{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-md-10">

            <div class="glass-card animate-on-scroll fade-in-up">

                <div class="text-center mb-5">
                    <h2 class="mb-3">Get Your OPD Token</h2>
                    <p class="text-muted">
                        Fill in your details to get an OPD token and join the queue
                    </p>
                </div>

                <form method="POST"
                      action="{{ url_for('opd.patient_submit_token') }}">

                    <div class="row g-4">

                        <!-- Full Name -->
                        <div class="col-md-6">
                            <label class="form-label">Full Name *</label>

                            <input type="text"
                                   name="full_name"
                                   class="form-control"
                                   required
                                   placeholder="Enter your full name">
                        </div>

                        <!-- Phone -->
                        <div class="col-md-6">
                            <label class="form-label">Phone Number *</label>

                            <input type="tel"
                                   name="phone"
                                   class="form-control"
                                   required
                                   placeholder="Enter your phone number">
                        </div>

                        <!-- Gender -->
                        <div class="col-md-6">
                            <label class="form-label">Gender *</label>

                            <select name="gender"
                                    class="form-select"
                                    required>

                                <option value="">Select Gender</option>

                                <option value="Male">
                                    Male
                                </option>

                                <option value="Female">
                                    Female
                                </option>

                                <option value="Other">
                                    Other
                                </option>

                            </select>
                        </div>

                        <!-- Age -->
                        <div class="col-md-6">
                            <label class="form-label">Age *</label>

                            <input type="number"
                                   name="age"
                                   class="form-control"
                                   required
                                   placeholder="Enter your age">
                        </div>

                        <!-- Department -->
                        <div class="col-12">
                            <label class="form-label">Department *</label>

                            <select name="department_id"
                                    class="form-select"
                                    required>

                                <option value="">
                                    Select Department
                                </option>

                                {% for dept in departments %}
                                <option value="{{ dept.id }}">
                                    {{ dept.department_name }}
                                </option>
                                {% endfor %}

                            </select>
                        </div>

                        <!-- Symptoms -->
                        <div class="col-12">
                            <label class="form-label">Symptoms *</label>

                            <textarea name="symptoms"
                                      class="form-control"
                                      rows="4"
                                      required
                                      placeholder="Describe your symptoms"></textarea>
                        </div>

                        <!-- Emergency -->
                        <div class="col-12">
                            <div class="form-check">

                                <input type="checkbox"
                                       name="is_emergency"
                                       class="form-check-input"
                                       id="emergency">

                                <label class="form-check-label"
                                       for="emergency">

                                    This is an emergency

                                </label>
                            </div>
                        </div>

                        <!-- Submit -->
                        <div class="col-12">

                            <button type="submit"
                                    class="btn btn-primary btn-lg w-100">

                                <i class="fas fa-ticket-alt me-2"></i>
                                Get OPD Token

                            </button>

                        </div>

                    </div>

                </form>

                <div class="mt-4 text-center">
                    <p class="text-muted small">

                        <i class="fas fa-info-circle me-1"></i>

                        Your token will be generated automatically
                        and you'll receive a printable OPD slip

                    </p>
                </div>

            </div>

        </div>
    </div>
</div>
{% endblock %}
