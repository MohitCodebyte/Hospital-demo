{% extends "admin/layout.html" %}

{% block title %}{{ action }} Diagnostic Test - Sahara Hospital ERP{% endblock %}

{% block admin_content %}
<div class="row align-items-center mb-4">
    <div class="col">
        <h3 class="mb-1 fw-bold text-dark">{{ action }} Diagnostic Test</h3>
        <p class="text-muted mb-0">Record or update test master details for laboratory billing and reports.</p>
    </div>
    <div class="col-auto">
        <a href="{{ url_for('laboratory.tests') }}" class="btn btn-outline-secondary px-3 rounded-pill">
            <i class="fa-solid fa-arrow-left me-1"></i> Back to Catalog
        </a>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="glass-card">
            <form method="POST" action="">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="test_name" class="form-label fw-semibold">Diagnostic Test Name *</label>
                        <input type="text" class="form-control rounded-3" id="test_name" name="test_name" 
                               value="{{ test.test_name if test else '' }}" required placeholder="e.g. Complete Blood Count (CBC)">
                    </div>
                    <div class="col-md-6">
                        <label for="category" class="form-label fw-semibold">Diagnostic Category *</label>
                        <select class="form-select rounded-3" id="category" name="category" required>
                            <option value="" disabled selected>Select Category</option>
                            <option value="Pathology" {% if test and test.category == 'Pathology' %}selected{% endif %}>Pathology</option>
                            <option value="Biochemistry" {% if test and test.category == 'Biochemistry' %}selected{% endif %}>Biochemistry</option>
                            <option value="Radiology" {% if test and test.category == 'Radiology' %}selected{% endif %}>Radiology</option>
                            <option value="Microbiology" {% if test and test.category == 'Microbiology' %}selected{% endif %}>Microbiology</option>
                            <option value="Hematology" {% if test and test.category == 'Hematology' %}selected{% endif %}>Hematology</option>
                            <option value="Immunology" {% if test and test.category == 'Immunology' %}selected{% endif %}>Immunology</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label for="rate" class="form-label fw-semibold">Billing Rate (₹) *</label>
                        <div class="input-group">
                            <span class="input-group-text">₹</span>
                            <input type="number" step="0.01" class="form-control rounded-3" id="rate" name="rate" min="0"
                                   value="{{ test.rate if test else '0.00' }}" required>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <label for="normal_range" class="form-label fw-semibold">Reference Normal Range</label>
                        <input type="text" class="form-control rounded-3" id="normal_range" name="normal_range" 
                               value="{{ test.normal_range if test else '' }}" placeholder="e.g. 4.0 - 11.0">
                    </div>
                    <div class="col-md-4">
                        <label for="unit" class="form-label fw-semibold">Reporting Unit</label>
                        <input type="text" class="form-control rounded-3" id="unit" name="unit" 
                               value="{{ test.unit if test else '' }}" placeholder="e.g. 10^3/uL, mg/dL">
                    </div>
                </div>

                <div class="mt-4 d-flex justify-content-end gap-2">
                    <a href="{{ url_for('laboratory.tests') }}" class="btn btn-outline-secondary px-4 rounded-pill">Cancel</a>
                    <button type="submit" class="btn btn-primary px-4 rounded-pill">
                        <i class="fa-solid fa-save me-1"></i> Save Diagnostic Test
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
